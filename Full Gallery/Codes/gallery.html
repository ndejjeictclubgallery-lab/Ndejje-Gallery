<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEE NDEJJEAN GALLERY</title>
    <link rel="icon" href="../media/images/Gallery Logo/Favicon Gallery.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

        :root {

            --primary-cream: #FFF8DC;
            --primary-white: #FFFFFF;
            --primary-gold: #FFD700;
            --primary-dark-blue: #001f3f; /* match home header/footer */
            --primary-light-blue: #4fc3f7;
            --accent-green: #4CAF50;

            --bg-primary: #FFFFFF; /* keep page content white */
            --bg-secondary: #FFF8DC;
            --bg-tertiary: #f5f5f5;
            --text-primary: #001f3f; /* dark text for light backgrounds */
            --text-secondary: #555555;
            --border-color: #e0e0e0;
            --hover-color: var(--accent-green);
            --hover-secondary: var(--primary-gold);
        }

        [data-theme="dark"], .theme-dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #404040;
            --hover-color: var(--accent-green);
            --hover-secondary: var(--primary-gold);
        }

        @media (prefers-color-scheme: dark) {
            .theme-auto {
                --bg-primary: #121212;
                --bg-secondary: #1e1e1e;
                --bg-tertiary: #2d2d2d;
                --text-primary: #ffffff;
                --text-secondary: #cccccc;
                --border-color: #404040;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background-color: var(--primary-dark-blue); /* dark blue header */
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 64px;
            color: white; /* ensure header text is visible on dark background */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: white;
            transition: background-color 0.3s ease;
        }

        .menu-toggle:hover {
            background-color: var(--hover-color);
            color: white;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .site-title {
            font-size: 20px;
            font-weight: 500;
            color: white;
            margin: 0;
        }

        .header-nav {
            display: flex;
            gap: 24px;
        }

        .nav-link {
            text-decoration: none;
            color: white;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: var(--hover-color);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-toggle, .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: white;
            transition: background-color 0.3s ease;
        }

        .theme-toggle:hover, .settings-btn:hover {
            background-color: var(--hover-secondary);
            color: white;
        }

        .gallery-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .media-count {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .theme-menu {
            display: none;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            gap: 12px;
            z-index: 1001;
        }

        .theme-menu.show {
            display: flex;
        }

        .theme-option {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-weight: 500;
        }

        .theme-option:hover {
            background-color: var(--hover-secondary);
            color: white;
            border-color: var(--hover-secondary);
        }

        .settings-panel {
            display: none;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            z-index: 1001;
        }

        .settings-panel.show {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-panel h3 {
            margin: 0 0 12px 0;
            color: var(--text-primary);
            font-size: 16px;
        }

        .setting-item {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-item label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .setting-item select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .sidebar {
            position: fixed;
            top: 64px;
            left: 0;
            width: 280px;
            height: calc(100vh - 64px);
            background-color: var(--primary-dark-blue); /* dark blue sidebar */
            border-right: 1px solid var(--border-color);
            padding: 24px 0;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .sidebar-nav {
            flex: 1;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            border-right: 3px solid transparent;
        }

        .sidebar-link:hover {
            background: linear-gradient(90deg, var(--accent-green) 0%, var(--primary-gold) 100%);
            border-right-color: var(--primary-gold);
        }

        .sidebar-link.active {
            background-color: var(--hover-color);
            color: white;
            border-right-color: var(--primary-gold);
        }

        .sidebar-link i {
            width: 20px;
            text-align: center;
        }

        .sidebar-actions {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-dark-blue) !important;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 8px;
        }

        .action-btn:hover {
            background-color: var(--hover-color);
            transform: translateY(-2px);
        }

        .main-content {
            margin-left: 280px;
            margin-top: 64px;
            transition: margin-left 0.3s ease;
            min-height: calc(100vh - 64px);
        }

        .main-content.sidebar-hidden {
            margin-left: 0;
        }

        .preview-slideshow {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 24px;
            transition: all 0.3s ease;
            max-height: 500px;
            overflow: hidden;
        }

        .preview-slideshow.hidden {
            display: none;
            max-height: 0;
            padding: 0;
            margin: 0;
            border: none;
        }

        .theme-toggle-header {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            border-radius: 6px;
            display: flex;
            align-items: center;
            font-size: 18px;
        }

        .theme-toggle-header:hover {
            background-color: var(--hover-color);
            color: white;
        }

        .slideshow-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        .slideshow-toggle-btn:hover {
            background-color: var(--hover-color);
            color: white;
        }

        .header .theme-menu {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: none;
            gap: 12px;
            z-index: 999;
            justify-content: center;
            flex-wrap: wrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--bg-secondary);
        }

        .header .theme-menu::-webkit-scrollbar {
            height: 4px;
        }

        .header .theme-menu::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .header .theme-menu::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .header .theme-menu.show {
            display: flex;
        }

        .slideshow-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .tab-btn {
            padding: 8px 16px;
            background: var(--primary-dark-blue);
            border: 1px solid var(--primary-dark-blue);
            border-radius: 20px;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: linear-gradient(90deg, var(--primary-gold) 0%, var(--accent-green) 100%);
            color: white;
            border-color: var(--accent-green);
        }

        .tab-btn.active {
            background-color: var(--primary-dark-blue);
            color: white;
            border-color: var(--primary-dark-blue);
        }

        .slideshow-content {
            position: relative;
            height: 400px;
            overflow: hidden;
            border-radius: 12px;
            background-color: #000;
        }

        .slideshow-container {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .slide-item {
            min-width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            flex-direction: column;
        }

        .slide-item.updating {
            opacity: 0.7;
        }

        .slide-item img, .slide-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            transform: translateZ(0);
            max-width: 100%;
            max-height: 100%;
        }

        .slide-item video {
            object-fit: contain;
            background-color: #000;
        }


        .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(255,255,255,0.85));
            color: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        .slide-badge {
            background-color: var(--accent-green);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            align-self: flex-start;
            margin-bottom: 8px;
        }

        .slide-badge:contains('Random') {
            background-color: var(--primary-gold);
            color: var(--primary-dark-blue);
        }

        .slideshow-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
        }

        .slideshow-nav:hover {
            background-color: var(--hover-color);
        }

        .slideshow-nav.prev {
            left: 16px;
        }

        .slideshow-nav.next {
            right: 16px;
        }

        .categories-bar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            position: sticky;
            top: 64px;
            z-index: 90;
        }

        .categories-nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--primary-dark-blue);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            cursor: pointer;
            color: #ffffff;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .category-btn:hover {
            background-color: var(--hover-color);
            color: white;
            border-color: var(--hover-color);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background-color: var(--primary-dark-blue);
            color: white;
            border-color: var(--primary-dark-blue);
        }

        .category-btn i {
            font-size: 16px;
        }



        .content-section {
            padding: 24px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .content-header h2 {
            color: #001f3f;
            font-weight: 500;
        }

        .view-controls {
            display: flex;
            gap: 8px;
        }

        .view-btn {
            padding: 8px 12px;
            background: var(--primary-dark-blue);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .view-btn:hover {
            background-color: var(--hover-secondary);
            color: white;
        }

        .view-btn.active {
            background-color: var(--primary-dark-blue);
            color: white;
            border-color: var(--primary-dark-blue);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .media-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background-color: var(--bg-tertiary);
        }

        .media-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .media-item img, .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .media-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .media-item:hover .media-overlay {
            opacity: 1;
        }

        .download-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: var(--accent-green);
            color: white;
            padding: 6px;
            border-radius: 50%;
            font-size: 12px;
        }

        .play-icon {
            color: white;
            font-size: 32px;
        }

        .loading-spinner {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .loading-spinner i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--primary-dark-blue);
        }

        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .albums-section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-gold);
            color: var(--primary-dark-blue);
            font-weight: 700;
            font-size: 16px;
        }

        .albums-section-header i {
            color: var(--primary-gold);
            font-size: 18px;
        }

        .albums-section-count {
            background-color: var(--primary-dark-blue);
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .albums-create-btn {
            margin-left: auto;
            background-color: var(--primary-gold);
            color: var(--primary-dark-blue);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .albums-create-btn:hover {
            background-color: var(--accent-green);
            color: #ffffff;
        }

        .albums-section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 8px;
        }

        .albums-section-empty {
            color: var(--text-secondary);
            font-size: 14px;
            padding: 20px 0;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .albums-section-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .albums-section-grid {
                grid-template-columns: 1fr;
            }
            .albums-section-header {
                font-size: 14px;
            }
        }

        .album-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .album-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border-color: var(--hover-color);
        }

        .album-cover {
            aspect-ratio: 16/9;
            background-color: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .album-title {
            font-weight: 500;
            margin-bottom: 4px;
            color: #001f3f;
        }

        .album-count {
            color: #001f3f;
            font-size: 14px;
        }

        .album-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .album-delete-btn {
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease;
            flex-shrink: 0;
        }

        .album-item:hover .album-delete-btn {
            opacity: 1;
        }

        .album-delete-btn:hover {
            background-color: #ffe0e0;
        }

        .album-date {
            color: #001f3f;
            font-size: 12px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .media-modal, .share-modal, .album-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            position: relative;
            width: 90vw;
            max-width: 1100px;
            max-height: 92vh;
            min-height: 300px;
            background-color: var(--bg-primary);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            transition: background-color 0.3s ease;
        }

        .modal-close:hover {
            background-color: var(--hover-color);
        }

        .modal-media {
            flex: 1;
            width: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--primary-dark-blue);
        }

        .modal-media img {
            max-width: 100%;
            max-height: 78vh;
            object-fit: contain;
            image-rendering: auto;
        }

        .modal-media iframe {
            width: 100%;
            flex: 1;
            min-height: 420px;
            border: none;
        }

        .modal-actions {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background-color: rgba(0,0,0,0.8);
            padding: 16px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .modal-actions .action-btn {
            background-color: var(--primary-dark-blue) !important;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .modal-actions .action-btn:hover {
            background-color: var(--hover-color);
            transform: translateY(-2px);
        }

        .modal-actions .action-btn span {
            display: inline;
        }

        .share-content {
            padding: 24px;
            width: 400px;
        }

        .share-content h3 {
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .share-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .share-btn {
            padding: 16px;
            background-color: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 16px;
        }

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .share-btn.whatsapp:hover {
            background-color: #25D366;
            color: white;
            border-color: #25D366;
        }

        .share-btn.twitter:hover {
            background-color: #000000;
            color: white;
            border-color: #000000;
        }

        .share-btn.instagram:hover {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            color: white;
            border-color: transparent;
        }

        .share-btn.email:hover {
            background-color: #4285F4;
            color: white;
            border-color: #4285F4;
        }

        .share-btn i {
            font-size: 20px;
        }

        .album-content {
            padding: 24px;
            width: 400px;
        }

        .album-content h3 {
            margin-bottom: 16px;
            color: #001f3f;
        }

        .album-content input, .album-content textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
            background-color: #f9f9f9;
            color: #000000;
            font-family: inherit;
        }

        .album-content input::placeholder, .album-content textarea::placeholder {
            color: #888888;
        }

        .album-content textarea {
            height: 100px;
            resize: vertical;
        }

        .album-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .album-actions button {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .album-actions button:first-child {
            background-color: var(--primary-dark-blue);
            color: white;
            border-color: var(--primary-dark-blue);
        }

        .album-actions button:first-child:hover {
            background-color: var(--hover-color);
            border-color: var(--hover-color);
        }

        .album-actions button:last-child {
            background-color: transparent;
            color: var(--text-primary);
        }

        .album-actions button:last-child:hover {
            background-color: var(--bg-tertiary);
        }

        /* Made by Emmanuella Jazyln */
        .footer {
            background-color: var(--primary-dark-blue); /* dark blue footer */
            border-top: 1px solid var(--border-color);
            padding: 24px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
        }

        .footer-links a {
            color: var(--primary-gold);
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-green);
            transform: translateY(-2px);
        }

        .footer-text {
            color: var(--text-primary);
            font-size: 14px;
        }

        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0;
            }

            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .categories-nav {
                justify-content: flex-start;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            .categories-nav::-webkit-scrollbar {
                display: none;
            }

            .category-btn {
                flex-shrink: 0;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                height: 60px;
                top: 0;
            }

            .header .theme-menu {
                top: 60px;
                padding: 12px 16px;
            }

            .main-content {
                margin-top: 60px;
            }

            .sidebar {
                top: 60px;
                height: calc(100vh - 60px);
            }

            .categories-bar {
                top: 60px;
                padding: 12px 16px;
            }

            .header-nav {
                display: none;
            }

            .site-title {
                font-size: 16px;
            }

            .content-section {
                padding: 16px;
            }

            .preview-slideshow {
                padding: 16px;
            }

            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px;
            }

            .slideshow-content {
                height: 200px;
            }

            .modal-content {
                margin: 16px;
                max-width: calc(100vw - 32px);
                max-height: calc(100vh - 32px);
            }

            .modal-actions {
                bottom: 16px;
                padding: 12px;
                border-radius: 25px;
            }

            .modal-actions .action-btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            .modal-actions .action-btn span {
                display: none;
            }

            .share-content, .album-content {
                width: 100%;
                max-width: calc(100vw - 64px);
                padding: 20px;
            }

            .share-options {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .category-btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            .category-btn span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 8px 12px;
            }

            .content-section {
                padding: 12px;
            }

            .preview-slideshow {
                padding: 12px;
            }

            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 6px;
            }

            .slideshow-tabs {
                flex-wrap: wrap;
                gap: 4px;
                justify-content: center;
            }

            .tab-btn {
                font-size: 12px;
                padding: 6px 10px;
            }

            .categories-bar {
                padding: 8px 12px;
            }

            .category-btn {
                padding: 8px 12px;
                min-width: 44px;
                justify-content: center;
            }

            .modal-actions {
                padding: 8px;
                gap: 8px;
            }

            .modal-actions .action-btn {
                padding: 8px 12px;
                min-width: 44px;
            }
        }

        /* List View */
        .media-grid.list-view {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .media-grid.list-view .media-item {
            aspect-ratio: unset;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .media-grid.list-view .media-item img,
        .media-grid.list-view .media-item video {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            margin-right: 16px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* ── Responsive: Tablet (≤ 1024px) ─────────────────────────── */
        @media (max-width: 1024px) {
            .albums-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 16px;
            }

            .header-nav {
                display: none;
            }

            .gallery-info {
                display: none;
            }

            .slideshow-toggle-btn span {
                display: none;
            }
        }

        /* ── Responsive: Mobile (≤ 768px) ──────────────────────────── */
        @media (max-width: 768px) {
            .albums-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .album-item {
                padding: 12px;
            }

            .album-title {
                font-size: 14px;
            }

            .album-count,
            .album-date {
                font-size: 12px;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .content-header h2 {
                font-size: 18px;
            }

            .header-left {
                gap: 8px;
            }

            .logo {
                width: 32px;
                height: 32px;
            }

            .header-right {
                gap: 6px;
            }

            .slideshow-toggle-btn {
                padding: 6px 8px;
                font-size: 13px;
            }

            .footer {
                padding: 16px;
            }

            .footer-links {
                gap: 16px;
                flex-wrap: wrap;
            }

            .footer-links a {
                font-size: 20px;
            }

            .footer-text {
                font-size: 12px;
            }
        }

        /* ── Responsive: Small Mobile (≤ 480px) ────────────────────── */
        @media (max-width: 480px) {
            .albums-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .album-cover {
                aspect-ratio: 16/9;
            }

            .site-title {
                font-size: 14px;
                max-width: 140px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .logo {
                width: 28px;
                height: 28px;
            }

            .header-right {
                gap: 4px;
            }

            .theme-toggle-header {
                padding: 6px;
            }

            .content-header h2 {
                font-size: 16px;
            }

            .view-btn {
                padding: 6px 8px;
                font-size: 12px;
            }

            .footer-links {
                gap: 12px;
            }

            .footer-links a {
                font-size: 18px;
            }
        }

        /* ── Responsive: Extra Small (≤ 360px) ─────────────────────── */
        @media (max-width: 360px) {
            .site-title {
                display: none;
            }

            .logo {
                width: 26px;
                height: 26px;
            }

            .albums-grid {
                grid-template-columns: 1fr;
            }

            .category-btn {
                padding: 6px 10px;
                font-size: 12px;
            }

            .content-section {
                padding: 10px;
            }
        }

    </style>

<body class="theme-light">

    <header class="header">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>

        </div>
        <div class="header-right">

            </button>
            <button class="slideshow-toggle-btn" id="slideshowToggle" onclick="toggleSlideshowDisplay()" title="Toggle slideshow">
                <i class="fas fa-sliders-h"></i>
                <span>Slideshow</span>

            <div id="themeMenu" class="theme-menu">
                <div class="theme-option" onclick="setTheme('light')">
                    <i class="fas fa-sun"></i> Light
                </div>
                <div class="theme-option" onclick="setTheme('dark')">
                    <i class="fas fa-moon"></i> Dark
                </div>
                <div class="theme-option" onclick="setTheme('auto')">
                    <i class="fas fa-adjust"></i> System
                </div>
            </div>
        </div>
    </header>



    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" data-category="all" onclick="setActiveCategory('all')">

                    <span>Albums</span>
                </a>
                <a href="#" class="sidebar-link" data-category="photos" onclick="setActiveCategory('photos')">
                    <i class="fas fa-image"></i>
                    <span>Photos</span>
                </a>
                <a href="#" class="sidebar-link" data-category="videos" onclick="setActiveCategory('videos')">
                    <i class="fas fa-video"></i>
                    <span>Videos</span>
                </a>
                <a href="#" class="sidebar-link" data-category="downloads" onclick="setActiveCategory('downloads')">
                    <i class="fas fa-download"></i>

                </div>

                </button>
                <button class="slideshow-nav next" onclick="nextSlide()">
                    <i class="fas fa-chevron-right"></i>
                </button>

        </section>

        <!-- Independent Categories Bar -->
        <section class="categories-bar">

                    <span>All</span>
                </button>
                <button class="category-btn" data-category="photos" onclick="setActiveCategory('photos')">
                    <i class="fas fa-image"></i>
                    <span>Photos</span>
                </button>
                <button class="category-btn" data-category="videos" onclick="setActiveCategory('videos')">
                    <i class="fas fa-video"></i>
                    <span>Videos</span>
                </button>
                <button class="category-btn" data-category="albums" onclick="setActiveCategory('albums')">
                    <i class="fas fa-folder"></i>
                    <span>Albums</span>
                </button>

        function updateMediaCount() {
            const mediaCountEl = document.getElementById('mediaCount');
            if (mediaCountEl) {

                        count = allMedia.filter(item => item.type === 'photo').length;
                        break;
                    case 'videos':
                        count = allMedia.filter(item => item.type === 'video').length;
                        break;
                    case 'albums':

                        count = downloadedMedia.length;

        function initializeUI() {

            if (showSidebarCheckbox) {

        async function loadGoogleDriveContent() {
            // ensure API key & folder settings are valid
            if (!validateDriveConfig()) {
                return; // message handled by validateDriveConfig
            }
            try {
                showLoading(true);


                const foldersToFetch = [{ id: FOLDER_ID, name: 'Gallery Confidential' }, ...SUBFOLDERS];

                let allFiles = [];

                for (const folder of foldersToFetch) {
                    let pageToken = '';
                    do {
                        const url = `https://www.googleapis.com/drive/v3/files?q='${folder.id}'+in+parents&fields=files(id,name,mimeType,createdTime,thumbnailLink,webContentLink,webViewLink,size),nextPageToken&orderBy=createdTime+desc&pageSize=1000&key=${API_KEY}${pageToken ? `&pageToken=${pageToken}` : ''}`;

                        const response = await fetch(url);
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const data = await response.json();
                        const files = (data.files || []).map(f => ({ ...f, _folderId: folder.id, _folderName: folder.name }));
                        allFiles = allFiles.concat(files);
                        pageToken = data.nextPageToken;
                    } while (pageToken);
                }

                allMedia = allFiles.filter(file =>
                    file.mimeType && (file.mimeType.startsWith('image/') || file.mimeType.startsWith('video/'))
                ).map(file => ({
                    id: file.id,
                    name: file.name,
                    type: file.mimeType.startsWith('image/') ? 'photo' : 'video',
                    mimeType: file.mimeType,
                    createdTime: file.createdTime,
                    thumbnailLink: `https://drive.google.com/thumbnail?id=${file.id}&sz=w400`,
                    highResLink: `https://drive.google.com/thumbnail?id=${file.id}&sz=w1200`,
                    fullResLink: file.webContentLink || `https://drive.google.com/uc?id=${file.id}`,
                    downloadLink: file.webContentLink || `https://drive.google.com/uc?export=download&id=${file.id}`,
                    viewLink: `https://drive.google.com/file/d/${file.id}/view`,
                    size: file.size,
                    folderId: file._folderId,
                    folderName: file._folderName
                }));

                albums = createAlbumsFromMedia(allMedia);

                // Merge in any user-created albums saved in localStorage
                // Must happen AFTER Drive albums are built so they aren't wiped
                const savedLocal = localStorage.getItem('ndejjean-albums');
                if (savedLocal) {
                    try {
                        const localAlbums = JSON.parse(savedLocal);
                        // Avoid duplicates — only add albums not already present
                        localAlbums.forEach(la => {
                            if (!albums.find(a => a.id === la.id)) {
                                albums.push(la);
                            }
                        });
                    } catch (e) {
                        console.error('Error restoring local albums:', e);
                    }
                }

                displayContent();
                updateSlideshow();
                updateMediaCount();

            } catch (error) {
                console.error('Error loading Google Drive content:', error);
                const extra = error && error.message ? ` (${error.message})` : '';
                showError('Failed to load media from Google Drive' + extra + '. The folder might be private or the API key is invalid.');
            } finally {
                showLoading(false);
            }
        }

        function loadLocalAlbums() {
            const savedAlbums = localStorage.getItem('ndejjean-albums');
            if (savedAlbums) {
                try {
                    const localAlbums = JSON.parse(savedAlbums);
                    albums = [...albums, ...localAlbums];
                } catch (error) {
                    console.error('Error loading local albums:', error);
                }
            }
        }

        function saveLocalAlbums() {
            const localAlbums = albums.filter(album => album.isLocal);
            localStorage.setItem('ndejjean-albums', JSON.stringify(localAlbums));
        }

        function loadDownloadedMedia() {
            const saved = localStorage.getItem('ndejjean-downloads');
            if (saved) {
                try {
                    downloadedMedia = JSON.parse(saved);
                } catch (error) {
                    console.error('Error loading downloaded media:', error);
                    downloadedMedia = [];
                }
            }
        }

        function saveDownloadedMedia() {
            localStorage.setItem('ndejjean-downloads', JSON.stringify(downloadedMedia));
        }


        function createAlbumsFromMedia(media) {
            const albumsMap = new Map();

            media.forEach(item => {
                const key = item.folderId || 'main';
                const name = item.folderName || 'Gallery Confidential';

                if (key === FOLDER_ID) {
                    return;
                }

                if (!albumsMap.has(key)) {
                    albumsMap.set(key, {
                        id: key,
                        name: name,
                        items: [],
                        coverImage: item.thumbnailLink,
                        createdDate: new Date(item.createdTime)
                    });
                }

                const album = albumsMap.get(key);
                album.items.push(item);

                const itemDate = new Date(item.createdTime);
                if (itemDate > album.createdDate) {
                    album.createdDate = itemDate;
                }

                if (!album.coverImage) album.coverImage = item.thumbnailLink;
            });

            return Array.from(albumsMap.values()).sort((a, b) => b.createdDate - a.createdDate);
        }

        function displayContent() {
            const mediaGrid = document.getElementById('mediaGrid');
            const albumsGrid = document.getElementById('albumsGrid');

            if (currentCategory === 'albums') {
                mediaGrid.style.display = 'none';
                albumsGrid.style.display = 'block';
                displayAlbums();
            } else if (currentCategory === 'downloads') {
                mediaGrid.style.display = 'grid';
                albumsGrid.style.display = 'none';

            } else {
                mediaGrid.style.display = 'grid';
                albumsGrid.style.display = 'none';
                displayMedia();
            }

            updateCategoryTitle();
            updateMediaCount();

        function displayMedia() {
            const mediaGrid = document.getElementById('mediaGrid');
            let filteredMedia = allMedia;

            if (activeAlbumId) {
                const activeAlbum = albums.find(a => a.id === activeAlbumId);
                if (activeAlbum && activeAlbum.isLocal) {
                    filteredMedia = activeAlbum.items || [];
                } else {
                    filteredMedia = allMedia.filter(item => item.folderId === activeAlbumId);
                }
            }

            switch (currentCategory) {
                case 'photos':
                    filteredMedia = filteredMedia.filter(item => item.type === 'photo');
                    break;
                case 'videos':
                    filteredMedia = filteredMedia.filter(item => item.type === 'video');
                    break;
                case 'all':
                default:
                    break;
            }

            if (filteredMedia.length === 0) {
                mediaGrid.innerHTML = '<div class="loading-spinner"><i class="fas fa-image"></i><p>No media found in this category</p></div>';
                return;
            }

            mediaGrid.innerHTML = filteredMedia.map(item => {
                const isVideo = item.type === 'video' || (item.mimeType && item.mimeType.startsWith('video/'));
                return `
                    <div class="media-item" onclick="openMediaModal('${item.id}')">
                        <img src="${item.highResLink || item.thumbnailLink}" alt="${item.name}" loading="lazy" onerror="this.src='${item.thumbnailLink}'">

                    </div>
                `;
            }).join('');

            if (currentView === 'list') {
                mediaGrid.classList.add('list-view');
            } else {
                mediaGrid.classList.remove('list-view');

        }

        function displayDownloads() {

            if (currentView === 'list') {
                mediaGrid.classList.add('list-view');

        function buildAlbumCard(album) {
            const coverSrc = album.coverImage
                ? (album.coverImage.includes('drive.google.com') ? album.coverImage.replace('&sz=w400', '&sz=w800') : album.coverImage)
                : 'https://via.placeholder.com/300x200/1a237e/FFFFFF?text=Album';
            const dateVal = album.createdDate || album.createdTime;
            const dateStr = dateVal ? new Date(dateVal).toLocaleDateString() : '';
            const deleteBtn = album.isLocal
                ? `<button class="album-delete-btn" onclick="event.stopPropagation();deleteLocalAlbum('${album.id}')" title="Delete album">
                       <i class="fas fa-trash"></i>
                   </button>`
                : '';
            return `
                <div class="album-item" onclick="openAlbum('${album.id}')">
                    <div class="album-cover">
                        <img src="${coverSrc}" alt="${album.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/1a237e/FFFFFF?text=Album'">
                    </div>
                    <div class="album-item-footer">
                        <div>
                            <div class="album-title">${album.name}</div>
                            <div class="album-count">${album.items.length} item${album.items.length !== 1 ? 's' : ''}</div>
                            ${dateStr ? `<div class="album-date">${dateStr}</div>` : ''}
                        </div>
                        ${deleteBtn}
                    </div>
                </div>
            `;
        }

        function deleteLocalAlbum(albumId) {
            if (!confirm('Delete this album? The photos inside will not be deleted.')) return;
            albums = albums.filter(a => a.id !== albumId);
            saveLocalAlbums();
            displayAlbums();
            showSuccess('Album deleted.');
        }

        function displayAlbums() {
            const albumsGrid = document.getElementById('albumsGrid');

            const galleryAlbums = albums.filter(a => !a.isLocal);
            const myAlbums = albums.filter(a => a.isLocal);

            let html = '';

            // Gallery Albums section (from Google Drive)
            html += `

                    <span>Gallery Albums</span>

                html += `<div class="albums-section-empty">No gallery albums found</div>`;
            } else {
                html += `<div class="albums-section-grid">${galleryAlbums.map(buildAlbumCard).join('')}</div>`;
            }

            // My Albums section (user-created)
            html += `
                <div class="albums-section-header" style="margin-top: 32px;">
                    <i class="fas fa-user"></i>
                    <span>My Albums</span>

                        <i class="fas fa-plus"></i> New Album

            if (myAlbums.length === 0) {
                html += `<div class="albums-section-empty">You haven't created any albums yet. Click "New Album" to get started.</div>`;
            } else {
                html += `<div class="albums-section-grid">${myAlbums.map(buildAlbumCard).join('')}</div>`;
            }

            albumsGrid.innerHTML = html;
        }
